<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="loginBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#loginBg)"/>
  
  <!-- 装饰圆形 -->
  <circle cx="100" cy="100" r="150" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="500" r="200" fill="rgba(255,255,255,0.1)"/>
  
  <!-- 登录卡片 -->
  <rect x="250" y="100" width="300" height="400" rx="20" fill="white" filter="url(#cardShadow)"/>
  
  <!-- 图标区域 -->
  <circle cx="400" cy="170" r="40" fill="#667eea"/>
  <text x="400" y="180" text-anchor="middle" fill="white" font-size="30">⚡</text>
  
  <!-- 标题 -->
  <text x="400" y="240" text-anchor="middle" fill="#2c3e50" font-family="Microsoft YaHei" font-size="20" font-weight="bold">惠电宿舍电费管理系统</text>
  
  <!-- 用户名输入框 -->
  <rect x="280" y="270" width="240" height="45" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="300" y="298" fill="#6c757d" font-family="Microsoft YaHei" font-size="13">👤 用户名</text>
  
  <!-- 密码输入框 -->
  <rect x="280" y="330" width="240" height="45" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="300" y="358" fill="#6c757d" font-family="Microsoft YaHei" font-size="13">🔒 密码</text>
  
  <!-- 登录按钮 -->
  <rect x="280" y="400" width="240" height="45" rx="8" fill="url(#btnGrad)"/>
  <text x="400" y="430" text-anchor="middle" fill="white" font-family="Microsoft YaHei" font-size="14" font-weight="bold">登 录</text>
  
  <!-- 版权信息 -->
  <text x="400" y="580" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Microsoft YaHei" font-size="11">© 2024 惠电宿舍电费管理系统</text>
</svg>